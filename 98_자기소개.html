<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개</title>
    <link rel="stylesheet" href="98_자기소개.css">
</head>
<body>
    <div id="container">
        <aside class="aside">
            <div class="aside-top">
                <div id="namecard">
                    <div class="name">소채연</div>
                    <img src="media/너구리.png" class="profileImg" alt="너구리">
                    <div class="hi">안녕하세요!!!!!!!</div>
                </div>
                <div id="detail">
                    <div class="detail-item"><img src="media/house.png" class="detailImg">Incheon, Korea</div>
                    <div class="detail-item"><img src="media/call.png" class="detailImg">010-1234-5678</div>
                </div>
            </div>
            <div id="sns">
                <a href="#"><img class="snsImg" src="media/youtube.png"></a>
                <a href="#"><img class="snsImg" src="media/discord.png"></a>
                <a href="#"><img class="snsImg" src="media/mail.png"></a>
                <a href="#"><img class="snsImg" src="media/kakao.png"></a>
            </div>
        </aside>

        <main id="main-area">
            <nav id="top-menu">
                <button onclick="showSection('intro')">자기소개</button>
                <button onclick="showSection('experience')">경력</button>
                <button onclick="showSection('skills')">보유기술</button>
                <button onclick="showSection('education')">학력</button>
            </nav>

            <div id="content">
                <section id="intro" class="tab-content active">
                    <h2 class="subtitle">자기소개</h2>
                    <div class="desc"><mark>프로그래밍</mark>에 관심이 많습니다. <br>현재 열심히 공부하며 코딩 중!</div>
                </section>

                <section id="experience" class="tab-content">
                    <h2 class="subtitle">Experience</h2>
                    <ul>
                        <li><strong>프론트엔드</strong>
                            <ul>
                                <li>HTML/CSS/JAVASCRIPT</li>
                                <li>웹 페이지 잘 만들고 싶음</li>
                            </ul>
                        </li>
                    </ul>
                </section>

                <section id="skills" class="tab-content">
                    <h2 class="subtitle">보유 기술</h2>
                    <ul>
                        <li>JAVA</li>
                        <li>ORACLE</li>
                        <li>밥먹기</li>
                        <li>잠자기</li>
                        <li>까먹기</li>
                    </ul>
                </section>

                <section id="education" class="tab-content">
                    <h2 class="subtitle">Education</h2>
                    <table class="edu-table">
                            <tr>
                                <th>출신학교</th>
                                <th>전공</th>
                                <th>기간</th>
                                <th>구분</th>
                            </tr>
                            <tr>
                                <td>너구리대학교</td>
                                <td>컴퓨터공학부</td>
                                <td>2022.3~2026.2</td>
                                <td>졸업</td>
                            </tr>
                            <tr>
                                <td>은행고등학교</td>
                                <td>-</td>
                                <td>2019.3~2022.2</td>
                                <td>졸업</td>
                            </tr>
                    </table>
                </section>
            </div>
        </main>
    </div>

    
</body>
</html>
<script>
        function showSection(id) {
            const sections = document.querySelectorAll('.tab-content');
            sections.forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
